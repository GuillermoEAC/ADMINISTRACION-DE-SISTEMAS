services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: ${HOSTNAME}
    domainname: ${DOMAIN}
    ports:
      - "25:25"    # SMTP
      - "143:143"  # IMAP
      - "587:587"  # SMTP seguro
      - "993:993"  # IMAP seguro
    volumes:
      - mail_data:/var/mail                 # <-- AHORA ES UN VOLUMEN INTERNO
      - mail_state:/var/mail-state          # <-- AHORA ES UN VOLUMEN INTERNO
      - ./datos_compartidos/logs:/var/log/mail     # <-- TUS LOGS SIGUEN AQUÍ
      - ./datos_compartidos/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_POSTGREY=0
      - ENABLE_SASLAUTHD=0
      - ONE_DIR=1
      - TLS_LEVEL=intermediate
      - PERMIT_DOCKER=connected-networks    # <-- Le da permiso libre a Roundcube
    cap_add:
      - NET_ADMIN 
    restart: always
    networks:
      - red_correo

  roundcube-db:
    image: mariadb:10.5
    container_name: roundcube-db
    restart: always
    volumes:
      - roundcube_db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=roundcubemail
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    networks:
      - red_datos_interna
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  roundcubemail:
    image: roundcube/roundcubemail:latest
    container_name: roundcubemail
    restart: always
    depends_on:
      roundcube-db:
        condition: service_healthy
    ports:
      - "8081:80" 
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=roundcube-db
      - ROUNDCUBEMAIL_DB_NAME=roundcubemail
      - ROUNDCUBEMAIL_DB_USER=${DB_USER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${DB_PASSWORD}
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587

    networks:
      - red_correo
      - red_datos_interna

networks:
  red_correo:
    driver: bridge
  red_datos_interna:
    driver: bridge
    internal: true 

volumes:
  roundcube_db_data:
  mail_data:
  mail_state:
