version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: lb_nginx
    ports:
      - "80:80"
    networks:
      - red_publica
      - red_datos
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  webapp:
    image: nginx:alpine
    container_name: app_interna
    networks:
      - red_datos
    restart: always
    command: /bin/sh -c "echo '<h1>App Interna FIM - Conexión exitosa a través del proxy</h1>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"

  db:
    image: postgres:15-alpine
    container_name: cluster_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - red_datos
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: panel_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - red_datos
    depends_on:
      db:
        condition: service_healthy
    restart: always

networks:
  red_publica:
    driver: bridge
  red_datos:
    internal: true

volumes:
  pg_data:
